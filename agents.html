<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SSB Order / Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="bg-white border-b">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="font-semibold">SSB Order</div>
      <nav class="text-sm flex gap-4">
        <a class="hover:underline" href="configurator.html">Configurator</a>
        <a class="hover:underline font-semibold" href="agents.html">Order</a>
      </nav>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-2">Order / Agent Verification</h1>
    <p class="text-slate-600 mb-6">กรอกข้อมูลลูกค้า + (ถ้ามีตัวแทน) อัปโหลดบัตรเพื่อยืนยัน</p>

    <div id="statusBox" class="hidden mb-4 p-3 rounded-lg border"></div>

    <section class="bg-white border rounded-2xl shadow-sm p-5 mb-6">
      <h2 class="font-semibold mb-3">Customer</h2>
      <div class="grid md:grid-cols-2 gap-3">
        <input id="custName" class="border rounded-lg p-2" placeholder="ชื่อ-นามสกุล"/>
        <input id="custPhone" class="border rounded-lg p-2" placeholder="เบอร์โทร"/>
        <input id="custEmail" class="border rounded-lg p-2 md:col-span-2" placeholder="อีเมล (ถ้ามี)"/>
      </div>
    </section>

    <section class="bg-white border rounded-2xl shadow-sm p-5 mb-6">
      <div class="flex items-center justify-between">
        <h2 class="font-semibold">Agent</h2>
        <label class="flex items-center gap-2 text-sm">
          <input id="haveAgent" type="checkbox"/>
          มีตัวแทน
        </label>
      </div>

      <div id="agentFields" class="hidden mt-4">
        <div class="grid md:grid-cols-2 gap-3 mb-3">
          <input id="agentCode" class="border rounded-lg p-2" placeholder="Agent Code"/>
          <input id="agentName" class="border rounded-lg p-2" placeholder="ชื่อ-นามสกุล ตัวแทน"/>
          <input id="agentPhone" class="border rounded-lg p-2 md:col-span-2" placeholder="เบอร์ตัวแทน"/>
        </div>

        <div class="border rounded-xl p-3 bg-slate-50">
          <div class="text-sm font-medium mb-2">อัปโหลดรูปบัตรตัวแทน (jpg/png)</div>
          <input id="cardFile" type="file" accept="image/png,image/jpeg" />
          <div class="mt-3 text-sm text-slate-600">Preview:</div>
          <img id="cardPreview" class="mt-2 max-h-56 rounded-xl border bg-white hidden" />
          <label class="mt-3 flex items-center gap-2 text-sm">
            <input id="cardConfirm" type="checkbox"/>
            ฉันยืนยันว่าบัตรจริงตรงกับข้อมูลในเว็บ
          </label>
        </div>
      </div>
    </section>

    <section class="bg-white border rounded-2xl shadow-sm p-5">
      <h2 class="font-semibold mb-3">Summary</h2>
      <div id="summaryBox" class="text-sm text-slate-700 space-y-1"></div>

      <div class="mt-4 p-4 rounded-xl bg-slate-50 border flex items-center justify-between">
        <div class="text-sm text-slate-600">Sell Total</div>
        <div class="text-xl font-bold" id="sellTotal">฿0</div>
      </div>

      <button id="btnSubmit" class="mt-4 w-full bg-blue-600 text-white rounded-xl py-3 hover:opacity-90">
        Submit Order → Google Sheet
      </button>
    </section>
  </main>

  <script type="module" src="js/order.js"></script>
</body>
</html>
